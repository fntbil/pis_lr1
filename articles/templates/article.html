{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="article">
    <h1>{{ post.title }}</h1>
    <p><b>Автор:</b> {{ post.author.username }}</p>
    <p><b>Дата:</b> {{ post.created_date }}</p>
    <p>{{ post.text }}</p>
    <p><a href="/">Назад ко всем статьям</a></p>
</body>
</html>
